version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: sidecar
    main: .
    binary: sidecar
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: sidecar
    # Version-less, uname-matching names so a stable URL works:
    #   .../releases/latest/download/sidecar_$(uname -s)_$(uname -m).tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

release:
  github:
    owner: than
    name: sidecar

changelog:
  use: github
  sort: asc
